<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLux Travel Agency | Appointment</title>
    <meta name="description" content="WanderLux Travel Agency offers personalised travel planning, guided tours, custom packages, and trip cost estimates.">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container nav">

            <a class="brand" href="index.html">WanderLux</a>

            <nav aria-label="Primary">
                <button 
                    class="btn btn-secondary nav-toggle" 
                    data-menu-toggle 
                    aria-expanded="false" 
                    aria-controls="main-nav">
                    Menu
                </button>

                <div class="nav-links" id="main-nav" data-menu>
                    <a href="index.html">Home</a>
                    <a href="services.html">Services</a>
                    <a href="calculator.html">Calculator</a>
                    <a href="appointment.html">Appointment</a>
                    <a href="about.html">About Us</a>
                    <a href="contact.html">Contact Us</a>
                </div>
            </nav>

            <button 
                class="btn btn-secondary theme-toggle" 
                data-theme-toggle 
                aria-label="Switch to dark mode">
                🌙
            </button>

        </div>
    </header>


    <!-- Main Content -->
    <main id="main">

        <section class="section">
            <div class="container">

                <div class="panel fade">

                    <span class="eyebrow">Appointment request</span>

                    <h1>Request a consultation with a travel planner.</h1>

                    <p class="muted">
                        Please complete this form to request a consultation.
                    </p>

                    <!-- Form -->
                    <form id="appointment-form"
                          method="POST"
                          action="https://formspree.io/f/mdabnojd"
                          novalidate>

                        <!-- Hidden fields -->
                        <input type="hidden" name="_subject" value="WanderLux Appointment Request">
                        <input type="hidden" name="_next" value="https://damarisnyanduko21.github.io/WanderLux/appointment.html">
                        <input type="text" name="_gotcha" style="display:none">

                        <!-- Name + Email -->
                        <div class="field-grid">

                            <div class="field">
                                <label for="app-name">Name</label>
                                <input id="app-name"
                                       name="name"
                                       data-error-key="app-name"
                                       required>

                                <span class="error-message"
                                      data-error-key="app-name"></span>
                            </div>

                            <div class="field">
                                <label for="app-email">Email</label>
                                <input id="app-email"
                                       name="email"
                                       type="email"
                                       data-error-key="app-email"
                                       required>

                                <span class="error-message"
                                      data-error-key="app-email"></span>
                            </div>

                        </div>

                        <!-- Phone + Date -->
                        <div class="field-grid">

                            <div class="field">
                                <label for="app-phone">Phone</label>
                                <input id="app-phone"
                                       name="phone"
                                       data-error-key="app-phone"
                                       required>

                                <span class="error-message"
                                      data-error-key="app-phone"></span>
                            </div>

                            <div class="field">
                                <label for="app-date">Preferred date</label>
                                <input id="app-date"
                                       name="date"
                                       type="date"
                                       data-error-key="app-date"
                                       required>

                                <span class="error-message"
                                      data-error-key="app-date"></span>
                            </div>

                        </div>

                        <!-- Message -->
                        <div class="field">
                            <label for="app-message">Message</label>
                            <textarea id="app-message"
                                      name="message"
                                      data-error-key="app-message"
                                      required></textarea>

                            <span class="error-message"
                                  data-error-key="app-message"></span>
                        </div>

                        <!-- Submit -->
                        <button class="btn btn-primary" type="submit">
                            Send appointment request
                        </button>

                        <p id="appointment-status"
                           class="muted"
                           aria-live="polite"></p>

                    </form>

                </div>

            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            2026 WanderLux Travel Agency. All rights reserved.
        </div>
    </footer>


    <script src="script.js"></script>

</body>
</html>
